<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Goofy 67 Snake</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle, #251c4a 0%, #0e091a 100%);
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 4 / 3; 
        }
        canvas {
            display: block;
            background: #110e1c;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 20px; 
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">SCORE: <span id="score">000</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // --- Web Audio Code Fix for Phones/Safari ---
        let audioCtx = null;

        // Force initialize audio when user taps the screen
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playEatSound(is67) {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (is67) {
                    // Crazy super funny retro alarm sound for 67
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                } else {
                    // Normal arcade pop sound
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                }
            } catch(e) {}
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        // --- Core Variables ---
        let snake = [
            {x: 400, y: 300},
            {x: 385, y: 300},
            {x: 370, y: 300},
            {x: 355, y: 300}
        ];
        
        let radius = 12;       
        let speed = 5;         
        let angle = 0;         
        let targetAngle = 0;   
        let score = 0;
        let isGameOver = false; 
        let growPending = 0;   
        let waveTimer = 0; 
        
        // New features for 67 effect
        let goofyMemeTimer = 0;    // Tracks how long the snake shakes after eating 67
        let memeTextTimer = 0;     // Tracks how long the funny pop-up text stays on screen
        let lastMemeMessage = "";   // Holds the funny english phrase

        // Funny 67 English Phrases
        const memePhrases = [
            "BRUH!! 67!!!", 
            "WHAT THE 67?!!", 
            "OH MY GOD 67!!", 
            "67 IS SO GOOFY LMAO", 
            "SHEESH! 67 POWER!"
        ];

        // Food Attributes
        let food = {
            x: 0,
            y: 0,
            radius: 16, 
            pulse: 1,
            type: '🍎'   
        };

        const foodPool = ['🍎', '🍌', '🍓', '🍩', '🍕', '🍇', '🍉', '🥑', '🍔', '🍟', '67'];

        function respawnFood() {
            food.x = Math.random() * (canvas.width - 100) + 50;
            food.y = Math.random() * (canvas.height - 100) + 50;
            food.type = foodPool[Math.floor(Math.random() * foodPool.length)];
            
            // MODIFIED: Make 67 collision box a bit bigger since the text size is larger
            if (food.type === '67') {
                food.radius = 26; 
            } else {
                food.radius = 16;
            }
        }

        respawnFood();

        // --- Core Logic: Update ---
        function update() {
            if (isGameOver) return; 

            // Count down timers
            if (goofyMemeTimer > 0) goofyMemeTimer--;
            if (memeTextTimer > 0) memeTextTimer--;

            // Snake shaking speed increases violently if it ate 67!
            if (goofyMemeTimer > 0) {
                waveTimer += speed * 0.4; // SUPER FAST DANCE SHAKE
            } else {
                waveTimer += speed * 0.02; // Normal slow trailing movement
            }

            let angleDiff = targetAngle - angle;
            angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
            angle += angleDiff * 0.2; 

            let head = {
                x: snake[0].x + Math.cos(angle) * speed,
                y: snake[0].y + Math.sin(angle) * speed
            };

            // Wall Collision Check
            if (head.x > canvas.width || head.x < 0 || head.y > canvas.height || head.y < 0) {
                isGameOver = true;
                playGameOverSound(); 
                return;
            }

            snake.unshift(head);

            // Food Collision Check
            let dx = head.x - food.x;
            let dy = head.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy); 

            if (distance < radius + food.radius) {
                if (food.type === '67') {
                    score += 67; 
                    goofyMemeTimer = 90; // Activating goofy animation for 90 frames (approx 1.5 seconds)
                    memeTextTimer = 90;  // Display funny text for 1.5 seconds
                    lastMemeMessage = memePhrases[Math.floor(Math.random() * memePhrases.length)];
                    playEatSound(true);  // Play special crazy sound
                } else {
                    score += 10;
                    playEatSound(false); // Play normal sound
                }
                scoreEl.innerText = score.toString().padStart(3, '0');
                respawnFood();
                speed += 0.15; 
                growPending += 3; 
            }

            if (growPending > 0) {
                growPending--; 
            } else {
                snake.pop(); 
            }

            // Self Collision Check
            for (let i = 15; i < snake.length; i++) {
                let sDx = head.x - snake[i].x;
                let sDy = head.y - snake[i].y;
                let sDist = Math.sqrt(sDx * sDx + sDy * sDy);
                if (sDist < radius * 0.8) {
                    isGameOver = true; 
                    playGameOverSound(); 
                    return;
                }
            }

            food.pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
        }

        function resetGame() {
            score = 0;
            speed = 6; 
            angle = 0;
            targetAngle = 0;
            isGameOver = false;
            growPending = 0; 
            waveTimer = 0;
            goofyMemeTimer = 0;
            memeTextTimer = 0;
            scoreEl.innerText = "000";
            snake = [
                {x: 400, y: 300},
                {x: 385, y: 300},
                {x: 370, y: 300},
                {x: 355, y: 300}
            ];
            respawnFood();
        }

        // --- Core Logic: Draw ---
        function draw() {
            ctx.fillStyle = '#110e1c'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Snake
            snake.forEach((segment, index) => {
                ctx.beginPath();
                
                let renderX = segment.x;
                let renderY = segment.y;

                // MODIFIED: Only wobble crazy if goofyMemeTimer is active!
                if (goofyMemeTimer > 0) {
                    renderX += Math.sin(waveTimer + index * 0.8) * 12 * Math.sin(angle + Math.PI/2);
                    renderY += Math.cos(waveTimer + index * 0.8) * 12 * Math.cos(angle + Math.PI/2);
                }

                if (index === 0) {
                    // Head
                    ctx.arc(renderX, renderY, radius * 1.3, 0, Math.PI * 2); 
                    ctx.fillStyle = '#4caf50'; 
                    ctx.fill();

                    // Eyes
                    let eyeOffsetAngle = 0.5; 
                    let leftEyeX = renderX + Math.cos(angle - eyeOffsetAngle) * 10;
                    let leftEyeY = renderY + Math.sin(angle - eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(leftEyeX, leftEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    // Goofy cross-eyed look when shaking
                    let pupilOffset = goofyMemeTimer > 0 ? 1 : 2.5;
                    ctx.arc(leftEyeX, leftEyeY, pupilOffset, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                    let rightEyeX = renderX + Math.cos(angle + eyeOffsetAngle) * 10;
                    let rightEyeY = renderY + Math.sin(angle + eyeOffsetAngle) * 10;
                    ctx.beginPath();
                    ctx.arc(rightEyeX, rightEyeY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.beginPath(); 
                    ctx.arc(rightEyeX, rightEyeY, pupilOffset, 0, Math.PI * 2);
                    ctx.fillStyle = '#000000';
                    ctx.fill();

                } else {
                    // Body
                    let bodyRadius = radius * (1 - index / (snake.length + 10));
                    ctx.arc(renderX, renderY, bodyRadius, 0, Math.PI * 2);
                    ctx.fillStyle = index % 2 === 0 ? '#81c784' : '#4caf50';
                    ctx.fill();
                }
            });

            // 2. Draw Food (MODIFIED: Made "67" giant and glowing)
            ctx.save();
            ctx.translate(food.x, food.y);
            let currentScale = food.pulse;
            ctx.scale(currentScale, currentScale); 
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (food.type === '67') {
                ctx.font = "900 55px Impact, sans-serif"; // MODIFIED: Doubled the font size!
                ctx.fillStyle = '#ffeb3b'; 
                ctx.shadowBlur = 25; // Super high glow
                ctx.shadowColor = '#ffeb3b';
                ctx.fillText(food.type, 0, 0);
            } else {
                ctx.font = "34px serif";
                ctx.fillText(food.type, 0, 0); 
            }
            ctx.restore();

            // NEW EFFECT: Draw flashing funny English texts on screen center
            if (memeTextTimer > 0) {
                ctx.save();
                ctx.fillStyle = memeTextTimer % 4 === 0 ? '#00e5ff' : '#ffea00'; // Rapid flashy colors
                ctx.font = 'black 36px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                // Add a little floating vibration shake effect to text
                let textShakeY = Math.sin(Date.now() * 0.05) * 4;
                ctx.fillText(lastMemeMessage, canvas.width / 2, 100 + textShakeY);
                ctx.restore();
            }

            // 3. Draw Game Over Menu
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff2a74';
                ctx.font = 'bold 45px system-ui, -apple-system'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = '#ffffff';
                ctx.font = '16px system-ui, -apple-system'; 
                ctx.fillText('TAP SCREEN TO RESTART', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function loop() {
            update(); 
            draw();
            requestAnimationFrame(loop);
        }

        // --- Controls ---
        window.addEventListener('keydown', (e) => {
            initAudio(); // Activate sound context
            if (isGameOver) {
                resetGame();
                return;
            }
            switch(e.key) {
                case 'ArrowUp':    targetAngle = -Math.PI / 2; break;
                case 'ArrowDown':  targetAngle = Math.PI / 2; break;
                case 'ArrowLeft':  targetAngle = Math.PI; break;
                case 'ArrowRight': targetAngle = 0; break;
            }
        });

        let touchStartX = 0;
        let touchStartY = 0;

        window.addEventListener('touchstart', (e) => {
            initAudio(); // IMPORTANT: This unlocks and fixes the sound for iPad/Phone!
            if (isGameOver) {
                resetGame();
                return;
            }
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY || isGameOver) return;

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                targetAngle = Math.atan2(dy, dx); 
                touchStartX = touchEndX;
                touchStartY = touchEndY;
            }
        }, { passive: true });

        loop();
    </script>
</body>
</html>
