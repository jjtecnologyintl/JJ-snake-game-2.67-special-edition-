<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JJ 67 Snake Game </title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at center, #14112a 0%, #050408 100%);
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        /* 优化：增大画面尺寸，iPad上更饱满，手机上自动缩放自适应 */
        #game-container {
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            width: 96vw;
            height: 72vw; /* 保持 4:3 黄金大画面 */
            max-width: 1024px; /* iPad 上允许展现的最大宽度 */
            max-height: 768px;
        }
        @media (max-aspect-ratio: 4/3) {
            #game-container {
                width: 96vw;
                height: 72vw;
            }
        }
        @media (min-aspect-ratio: 4/3) {
            #game-container {
                height: 90vh;
                width: 120vh; /* 宽屏设备下优化 */
            }
        }
        canvas {
            display: block;
            background: #080610;
            width: 100%;
            height: 100%;
        }
        /* 毛玻璃 UI */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.04);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 13px; 
            font-weight: 800;
            letter-spacing: 1.5px;
            pointer-events: none;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 5;
        }
        #speed-controller {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 6px;
            z-index: 5;
            padding: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .speed-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            background: transparent;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s ease;
        }
        .speed-btn.active {
            background: #ffea00;
            color: #090712;
            font-weight: 800;
        }
        #start-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050408;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        #play-btn {
            padding: 16px 48px;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #06040a;
            background: #ffea00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(255, 234, 0, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-menu">
            <button id="play-btn" onclick="startGame()">START GAME</button>
        </div>
        
        <div id="ui-layer">
            <div style="color: rgba(255,255,255,0.9); font-size: 15px;">SCORE: <span id="score" style="color: #fff; font-weight:900;">000</span></div>
            <div style="color: #ff2a74; font-size: 11px;">HIGHEST RECORD: <span id="high-score" style="font-weight:800;">000</span></div>
            <div id="food-counter" style="color: #00e5ff; font-size: 11px; font-weight:800;">EATEN: 0</div>
        </div>
        
        <div id="speed-controller">
            <button id="btn-low" class="speed-btn" onclick="changeSpeedSetting('LOW')">LOW</button>
            <button id="btn-med" class="speed-btn active" onclick="changeSpeedSetting('MED')">MED</button>
            <button id="btn-high" class="speed-btn" onclick="changeSpeedSetting('HIGH')">HIGH</button>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const foodCounterEl = document.getElementById('food-counter');
        const startMenu = document.getElementById('start-menu');

        let audioCtx = null;
        let isGameStarted = false; 

        const SPEED_MODIFIERS = { 'LOW': 4, 'MED': 6.5, 'HIGH': 9 };
        let currentSpeedSetting = 'MED';

        let currentSkin = 'CLASSIC';
        let totalFoodEatenThisSession = 0; 

        let savedHighScore = localStorage.getItem('snake_67_high') || 0;
        highScoreEl.innerText = savedHighScore.toString().padStart(3, '0');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playCrazy67Sound() {
            if (!audioCtx) return;
            try {
                let now = audioCtx.currentTime;
                let osc1 = audioCtx.createOscillator();
                let osc2 = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
                osc1.type = 'sawtooth'; osc2.type = 'square';   
                osc1.frequency.setValueAtTime(100, now);
                osc1.frequency.linearRampToValueAtTime(1500, now + 0.1);
                osc1.frequency.linearRampToValueAtTime(300, now + 0.3);
                osc2.frequency.setValueAtTime(300, now);
                osc2.frequency.linearRampToValueAtTime(1800, now + 0.15);
                osc2.frequency.linearRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.3); osc2.stop(now + 0.3);
            } catch(e) {}
        }

        function playEatSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } catch(e) {}
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } catch(e) {}
        }

        function startGame() {
            initAudio(); 
            isGameStarted = true;
            startMenu.style.display = 'none'; 
        }

        function changeSpeedSetting(newSetting) {
            currentSpeedSetting = newSetting;
            speed = SPEED_MODIFIERS[newSetting];
            document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${newSetting.toLowerCase()}`).classList.add('active');
        }

        function updateSkinUnlocks() {
            foodCounterEl.innerText = `EATEN: ${totalFoodEatenThisSession}`;
            if (totalFoodEatenThisSession >= 16) {
                currentSkin = 'GOLD'; 
            } else if (totalFoodEatenThisSession >= 8) {
                currentSkin = 'BLUE'; 
            } else {
                currentSkin = 'CLASSIC'; 
            }
        }

        // --- Core Variables ---
        let snake = [{x: 400, y: 300}, {x: 385, y: 300}, {x: 370, y: 300}, {x: 355, y: 300}];
        let radius = 12;       
        let speed = SPEED_MODIFIERS['MED'];         
        let angle = 0;         
        let targetAngle = 0;   
        let score = 0;
        let isGameOver = false; 
        let growPending = 0;   
        let waveTimer = 0; 
        let goofyMemeTimer = 0;    
        let memeTextTimer = 0;     
        let lastMemeMessage = "";   
        let consecutiveNon67Count = 0; 

        const memePhrases = ["BRUH!! 67!!!", "WHAT THE 67?!!", "OH MY GOD 67!!", "67 IS SO GOOFY LMAO", "SHEESH! 67 POWER!"];
        let food = { x: 0, y: 0, radius: 16, pulse: 1, type: '🍎' };
        const fruits = ['🍎', '🍌', '🍓', '🍩', '🍕', '🍇', '🍉', '🥑', '🍔', '🍟'];

        // 优化：智能避让算法，防止食物刷到左上角 UI 区域和右上角速度区
        function respawnFood() {
            let valid = false;
            let rx, ry;
            
            while (!valid) {
                rx = Math.random() * (canvas.width - 100) + 50;
                ry = Math.random() * (canvas.height - 100) + 50;
                
                // 避开左上角 UI 区域 (x < 240, y < 140) 
                if (rx < 240 && ry < 140) continue;
                // 避开右上角速度区域 (x > 560, y < 80)
                if (rx > 560 && ry < 80) continue;
                
                valid = true;
            }

            food.x = rx;
            food.y = ry;
            
            let dynamicChance = 0.20; 
            if (consecutiveNon67Count > 4) dynamicChance = 0.50; 
            if (consecutiveNon67Count === 0) dynamicChance = 0.05; 

            if (Math.random() < dynamicChance) {
                food.type = '67';
                food.radius = 28; 
                consecutiveNon67Count = 0; 
            } else {
                food.type = fruits[Math.floor(Math.random() * fruits.length)];
                food.radius = 16;
                consecutiveNon67Count++;
            }
        }

        respawnFood();

        function update() {
            if (!isGameStarted || isGameOver) return; 

            if (goofyMemeTimer > 0) goofyMemeTimer--;
            if (memeTextTimer > 0) memeTextTimer--;

            if (goofyMemeTimer > 0) {
                waveTimer += speed * 0.45; 
            } else {
                waveTimer += speed * 0.02; 
            }

            let angleDiff = targetAngle - angle;
            angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
            angle += angleDiff * 0.2; 

            let head = {
                x: snake[0].x + Math.cos(angle) * speed,
                y: snake[0].y + Math.sin(angle) * speed
            };

            if (head.x > canvas.width || head.x < 0 || head.y > canvas.height || head.y < 0) {
                isGameOver = true;
                playGameOverSound(); 
                return;
            }

            snake.unshift(head);

            let dx = head.x - food.x;
            let dy = head.y - food.y;
            let distance = Math.sqrt(dx * dx + dy * dy); 

            if (distance < radius + food.radius) {
                totalFoodEatenThisSession++; 
                updateSkinUnlocks();

                if (food.type === '67') {
                    score += 67; 
                    goofyMemeTimer = 90; 
                    memeTextTimer = 90;  
                    lastMemeMessage = memePhrases[Math.floor(Math.random() * memePhrases.length)];
                    playCrazy67Sound();  
                } else {
                    score += 10;
                    playEatSound(); 
                }
                
                scoreEl.innerText = score.toString().padStart(3, '0');

                if (score > savedHighScore) {
                    savedHighScore = score;
                    localStorage.setItem('snake_67_high', savedHighScore);
                    highScoreEl.innerText = savedHighScore.toString().padStart(3, '0');
                }

                respawnFood();
                speed += 0.12; 
                growPending += 3; 
            }

            if (growPending > 0) { growPending--; } else { snake.pop(); }

            for (let i = 15; i < snake.length; i++) {
                let sDx = head.x - snake[i].x;
                let sDy = head.y - snake[i].y;
                let sDist = Math.sqrt(sDx * sDx + sDy * sDy);
                if (sDist < radius * 0.8) {
                    isGameOver = true; 
                    playGameOverSound(); 
                    return;
                }
            }

            food.pulse = 1 + Math.sin(Date.now() * 0.005) * 0.15;
        }

        function draw() {
            if (goofyMemeTimer > 0) {
                let hue = (Date.now() * 0.4) % 360;
                ctx.fillStyle = `hsla(${hue}, 85%, 14%, 1)`;
            } else {
                ctx.fillStyle = '#0a0813'; 
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // iPad 安全版高级发光技术：通过高透明色块多层叠加，模拟出完美的电竞发光，绝不变黑！
            let mainColor, glowColor;
            if (currentSkin === 'BLUE') {
                mainColor = '#00e5ff'; glowColor = 'rgba(0, 229, 255, 0.3)';
            } else if (currentSkin === 'GOLD') {
                mainColor = '#ffea00'; glowColor = 'rgba(255, 234, 0, 0.3)';
            } else {
                mainColor = '#00ff66'; glowColor = 'rgba(0, 255, 102, 0.3)';
            }

            // 1. 绘制蛇（发光外圈 + 实体内圈）
            snake.forEach((segment, index) => {
                let renderX = segment.x;
                let renderY = segment.y;

                if (goofyMemeTimer > 0) {
                    renderX += Math.sin(waveTimer + index * 0.8) * 14 * Math.sin(angle + Math.PI/2);
                    renderY += Math.cos(waveTimer + index * 0.8) * 14 * Math.cos(angle + Math.PI/2);
                }

                let bodyRadius = index === 0 ? radius * 1.3 : radius * (1 - index / (snake.length + 12));
                if (bodyRadius < 3) bodyRadius = 3;

                // 绘制安全发光晕层
                ctx.beginPath();
                ctx.arc(renderX, renderY, bodyRadius + 6, 0, Math.PI * 2);
                ctx.fillStyle = glowColor;
                ctx.fill();

                // 绘制实体中心
                ctx.beginPath();
                ctx.arc(renderX, renderY, bodyRadius, 0, Math.PI * 2);
                if (index === 0) {
                    ctx.fillStyle = mainColor;
                } else {
                    ctx.fillStyle = index % 2 === 0 ? mainColor : 'rgba(255,255,255,0.2)';
                }
                ctx.fill();

                // 头部画眼
                if (index === 0) {
                    let eyeOffsetAngle = 0.5; 
                    let leftEyeX = renderX + Math.cos(angle - eyeOffsetAngle) * 10;
                    let leftEyeY = renderY + Math.sin(angle - eyeOffsetAngle) * 10;
                    ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, 5, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(leftEyeX, leftEyeY, goofyMemeTimer > 0 ? 1 : 2.5, 0, Math.PI * 2); ctx.fillStyle = '#000000'; ctx.fill();

                    let rightEyeX = renderX + Math.cos(angle + eyeOffsetAngle) * 10;
                    let rightEyeY = renderY + Math.sin(angle + eyeOffsetAngle) * 10;
                    ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, 5, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                    ctx.beginPath(); ctx.arc(rightEyeX, rightEyeY, goofyMemeTimer > 0 ? 1 : 2.5, 0, Math.PI * 2); ctx.fillStyle = '#000000'; ctx.fill();
                }
            });

            // 2. 绘制食物
            ctx.save();
            ctx.translate(food.x, food.y);
            let currentScale = food.pulse;
            ctx.scale(currentScale, currentScale); 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            if (food.type === '67') {
                // 为 67 渲染安全霓虹光环
                ctx.beginPath();
                ctx.arc(0, 0, 35, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 234, 0, 0.25)';
                ctx.fill();

                ctx.font = "900 64px Impact, Arial Black, sans-serif"; 
                ctx.fillStyle = '#ffea00'; 
                ctx.fillText(food.type, 0, 0);
            } else {
                ctx.font = "36px serif";
                ctx.fillText(food.type, 0, 0); 
            }
            ctx.restore();

            // 飘字魔性标签
            if (memeTextTimer > 0) {
                ctx.save();
                ctx.fillStyle = memeTextTimer % 4 === 0 ? '#00ffff' : '#ff0055'; 
                ctx.font = '900 42px Impact, Arial Black, sans-serif';
                ctx.textAlign = 'center';
                let textShakeY = Math.sin(Date.now() * 0.06) * 7;
                ctx.fillText(lastMemeMessage, canvas.width / 2, 115 + textShakeY);
                ctx.restore();
            }

            // Game Over 面板
            if (isGameOver) {
                ctx.fillStyle = 'rgba(5, 3, 10, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0055';
                ctx.font = '900 50px system-ui, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 25);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '600 14px monospace'; 
                ctx.fillText('TAP SCREEN TO RESTART', canvas.width / 2, canvas.height / 2 + 45);
            }
        }

        function resetGame() {
            score = 0; 
            totalFoodEatenThisSession = 0;
            currentSkin = 'CLASSIC';
            foodCounterEl.innerText = "EATEN: 0";

            speed = SPEED_MODIFIERS[currentSpeedSetting]; 
            angle = 0; targetAngle = 0; isGameOver = false; growPending = 0; waveTimer = 0; goofyMemeTimer = 0; memeTextTimer = 0;
            scoreEl.innerText = "000";
            snake = [{x: 400, y: 300}, {x: 385, y: 300}, {x: 370, y: 300}, {x: 355, y: 300}];
            respawnFood();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        window.addEventListener('keydown', (e) => {
            initAudio(); 
            if (isGameOver) { resetGame(); return; }
            switch(e.key) {
                case 'ArrowUp':    targetAngle = -Math.PI / 2; break;
                case 'ArrowDown':  targetAngle = Math.PI / 2; break;
                case 'ArrowLeft':  targetAngle = Math.PI; break;
                case 'ArrowRight': targetAngle = 0; break;
            }
        });

        let touchStartX = 0; let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            initAudio(); 
            if (isGameOver) { resetGame(); return; }
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY || isGameOver || !isGameStarted) return;
            let touchEndX = e.touches[0].clientX; let touchEndY = e.touches[0].clientY;
            let dx = touchEndX - touchStartX; let dy = touchEndY - touchStartY;
            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                targetAngle = Math.atan2(dy, dx); touchStartX = touchEndX; touchStartY = touchEndY;
            }
        }, { passive: true });

        loop();
    </script>
</body>
</html>
